<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SimplePortScanner V2</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="stage-shell">
    <aside class="identity-panel" aria-label="Project identity">
      <div class="vertical-word">SCANNER</div>
      <div class="money-card">
        <strong id="statusMini">127.0.0.1</strong>
        <span>local scanner</span>
      </div>
      <div class="poster-splashes" aria-hidden="true">
        <i></i>
        <i></i>
        <i></i>
        <i></i>
      </div>
      <div class="character-cut" aria-hidden="true">
        <div class="character-hair"></div>
        <div class="character-head"></div>
        <div class="character-eye"></div>
        <div class="character-body"></div>
        <div class="character-cable"></div>
      </div>
      <div class="line-art" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="brand-lockup">
        <p>TCP CONNECT</p>
        <h1>PORT<br>SCAN</h1>
      </div>
    </aside>

    <main class="blue-panel">
      <div class="aqua-wash" aria-hidden="true"></div>
      <div class="grid-overlay" aria-hidden="true"></div>

      <section class="view-frame" id="viewFrame" aria-live="polite"></section>
    </main>

    <div class="transition-mask" id="transitionMask" aria-hidden="true">
      <span>LOADING</span>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
